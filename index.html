<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a; /* Deep Blue */
            color: #ffffff; /* White */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background-color: #1b263b; /* Darker Blue/Black tone */
            border-top: 5px solid #f9844a; /* Orange Accent */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar {
            width: 100px;
            height: 4px;
            background-color: #f9844a; /* Orange */
            margin: 20px auto;
        }

        p {
            font-size: 1.2rem;
            color: #e0e1dd; /* Off-white */
        }

        .email-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #f9844a; /* Orange */
            color: #1b263b; /* Dark Blue */
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .email-link:hover {
            background-color: #ff9f1c; /* Lighter Orange */
            transform: translateY(-2px);
        }

        .gear-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="gear-icon">⚙️</span>
        <h1>Under Construction</h1>
        <div class="status-bar"></div>
        <p>Something exciting is in the works. We are currently building our new website to give you the best experience possible.</p>
        
        <p>In the meantime, you can contact me on email:</p>
        <a href="mailto:your-email@example.com" class="email-link">your-email@example.com</a>
    </div>

</body>
</html>
